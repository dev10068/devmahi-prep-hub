let currentQ = parseInt(localStorage.getItem('savedQ')) || 0;
let userAnswers = JSON.parse(localStorage.getItem('savedAnswers')) || {};

function loadQuestion() {
    const qData = questions[currentQ];
    document.getElementById('q-num').innerText = `Q. ${currentQ + 1}/${questions.length}`;
    document.getElementById('q-text').innerText = qData.q;
    
    // प्रोग्रेस सेव करें
    localStorage.setItem('savedQ', currentQ);
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    qData.opts.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        
        // Immediate Feedback Logic
        if (userAnswers[currentQ] !== undefined) {
            if (index === qData.ans) btn.classList.add('correct');
            else if (userAnswers[currentQ] === index) btn.classList.add('wrong');
            btn.disabled = true;
        }
        
        btn.innerText = opt;
        btn.onclick = () => { 
            userAnswers[currentQ] = index; 
            localStorage.setItem('savedAnswers', JSON.stringify(userAnswers));
            loadQuestion(); 
        };
        container.appendChild(btn);
    });
    document.getElementById('submit-btn').style.display = currentQ === questions.length - 1 ? 'block' : 'none';
}

function changeQ(step) {
    if (currentQ + step >= 0 && currentQ + step < questions.length) {
        currentQ += step;
        loadQuestion();
    }
}

function submitTest() {
    let score = 0;
    questions.forEach((q, i) => { if(userAnswers[i] === q.ans) score++; });
    alert("Test Finished! Your Score: " + score + "/" + questions.length);
    localStorage.clear(); // टेस्ट के बाद मेमोरी साफ़ करें
}
