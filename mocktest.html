<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mega Mock Test (50 Qs) - ExamGuru</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f1f3d; --saffron: #ff6b00; --green: #00b877; --red: #e63946;
  --yellow: #ffd60a; --text: #1a1a2e; --muted: #4b5563;
  --border: rgba(255, 255, 255, 0.4);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Noto Sans', sans-serif; color: var(--text);
  min-height: 100vh; overscroll-behavior: none;
  background-image: radial-gradient(rgba(255,255,255,0.8) 1px, transparent 1px),
                    radial-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
                    linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
  background-size: 50px 50px, 70px 70px, 100% 100%; background-attachment: fixed;
}
.glass-card {
  background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border);
  border-radius: 16px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
}

/* Header */
header {
  background: rgba(15, 31, 61, 0.85); backdrop-filter: blur(10px);
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top:0; z-index:200; color: white; border-bottom: 1px solid rgba(255,255,255,0.1);
}
.back-btn { background:rgba(255,255,255,0.2); border:none; color:white; width:36px; height:36px; border-radius:50%; font-size:18px; cursor:pointer; }
.timer { font-family:'Baloo 2',cursive; font-size:16px; font-weight:800; color:var(--yellow); background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 20px;}

/* Main Area */
.container { padding: 20px 14px; padding-bottom: 120px; }
.q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 2px dashed rgba(0,0,0,0.1); padding-bottom: 10px; }
.q-num { font-family:'Baloo 2',cursive; font-size: 18px; font-weight: 800; color: var(--navy); }
.q-tag { font-size: 10px; background: var(--navy); color: white; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
.q-text { font-size: 16px; font-weight: 700; line-height: 1.5; color: var(--navy); margin-bottom: 20px; }

/* Options */
.opt-btn {
  width: 100%; text-align: left; background: rgba(255,255,255,0.7);
  border: 2px solid rgba(0,0,0,0.05); border-radius: 12px; padding: 14px;
  margin-bottom: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 12px; transition: 0.2s; color: var(--text);
}
.opt-btn.selected { background: rgba(255, 107, 0, 0.15); border-color: var(--saffron); }
.opt-circle {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--muted);
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; color: var(--navy);
}
.opt-btn.selected .opt-circle { background: var(--saffron); border-color: var(--saffron); color: white; }

/* Bottom Nav Controls */
.test-controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(15px);
  padding: 14px; display: flex; justify-content: space-between; gap: 10px;
  border-top: 1px solid var(--border); box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
}
.ctrl-btn { flex: 1; padding: 14px; border-radius: 12px; font-family: 'Baloo 2',cursive; font-size: 16px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
.btn-prev { background: rgba(0,0,0,0.05); color: var(--navy); }
.btn-next { background: var(--saffron); color: white; box-shadow: 0 4px 15px rgba(255,107,0,0.3); }
.btn-submit { background: var(--green); color: white; display: none; box-shadow: 0 4px 15px rgba(0,184,119,0.3); }

/* POPUP */
#popup-overlay, #result-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.popup-box { width: 90%; max-width: 350px; text-align: center; padding: 24px; background: white; border-radius: 20px; }
.popup-box h2 { font-family: 'Baloo 2',cursive; color: var(--navy); margin-bottom: 10px; font-size: 24px; }
.popup-box p { font-size: 14px; color: var(--muted); margin-bottom: 20px; font-weight: 500; }
.pop-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; margin-bottom: 10px; cursor: pointer; font-family: 'Baloo 2',cursive; transition: 0.2s; }
.pop-resume { background: var(--navy); color: white; }
.pop-restart { background: rgba(230, 57, 70, 0.1); color: var(--red); border: 2px solid rgba(230, 57, 70, 0.2); }

/* Score Highlight */
.score-big { font-family: 'Baloo 2',cursive; font-size: 48px; color: var(--saffron); line-height: 1; margin-bottom: 10px; }

</style>
</head>
<body>

<!-- Welcome / Resume Popup -->
<div id="popup-overlay" style="display: none;">
  <div class="popup-box">
    <h2>Welcome Back! 🚀</h2>
    <p id="popup-msg">Aapne pichla test beech mein chhod diya tha.</p>
    <button class="pop-btn pop-resume" onclick="resumeTest()">🟢 Wahin Se Shuru Karein</button>
    <button class="pop-btn pop-restart" onclick="restartTest()">🔴 Zero Se Restart Karein</button>
  </div>
</div>

<!-- Final Result Popup -->
<div id="result-overlay" style="display: none;">
  <div class="popup-box">
    <h2>Test Completed! 🏆</h2>
    <p>Aapka Final Score:</p>
    <div class="score-big" id="final-score">0/50</div>
    <p id="feedback-msg">Badhiya koshish!</p>
    <button class="pop-btn pop-resume" onclick="window.location.href='index.html'">🏠 Home Par Jayein</button>
    <button class="pop-btn pop-restart" onclick="restartTest()">🔄 Dobara Test Dein</button>
  </div>
</div>

<header>
  <button class="back-btn" onclick="window.location.href='index.html'">←</button>
  <div style="font-family:'Baloo 2',cursive; font-weight:800; font-size:18px;">Mega Mock Test</div>
  <div class="timer" id="timer">60:00</div>
</header>

<div class="container">
  <div class="glass-card" style="padding: 20px;">
    <div class="q-header">
      <div class="q-num" id="q-num">Q. 1/50</div>
      <div class="q-tag" id="q-tag">GK & GS</div>
    </div>
    <div class="q-text" id="q-text">Loading question...</div>
    
    <div id="options-container">
      <!-- Options will load here -->
    </div>
  </div>
</div>

<div class="test-controls">
  <button class="ctrl-btn btn-prev" id="prev-btn" onclick="changeQ(-1)">← Pichla</button>
  <button class="ctrl-btn btn-next" id="next-btn" onclick="changeQ(1)">Agla Sawaal →</button>
  <button class="ctrl-btn btn-submit" id="submit-btn" onclick="submitTest()">✅ Submit Test</button>
</div>

<script>
// 🎯 TOP 50 PREVIOUS YEAR QUESTIONS (SSC & NTPC MIX)
const questions = [
  // 🌍 General Knowledge & Science (1-15)
  { q: "Bharat ki pehli mahila Rashtrapati kaun thi?", opts: ["Indira Gandhi", "Pratibha Patil", "Sarojini Naidu", "Sushma Swaraj"], ans: 1, tag: "Polity" },
  { q: "Vitamin C ki kami se kaunsi bimari hoti hai?", opts: ["Beri-Beri", "Scurvy", "Rickets", "Night Blindness"], ans: 1, tag: "Biology" },
  { q: "Panipat ki teesri ladai kis saal hui thi?", opts: ["1526", "1556", "1761", "1857"], ans: 2, tag: "History" },
  { q: "Hawa Mahal kis shehar mein sthit hai?", opts: ["Udaipur", "Jodhpur", "Jaipur", "Agra"], ans: 2, tag: "Art & Culture" },
  { q: "Samvidhan (Constitution) banne mein kitna samay laga tha?", opts: ["2 Saal 11 Mahine 18 Din", "2 Saal 5 Mahine 10 Din", "3 Saal", "1 Saal 11 Mahine"], ans: 0, tag: "Polity" },
  { q: "Saurmandal (Solar System) ka sabse bada grah kaunsa hai?", opts: ["Mars", "Saturn", "Jupiter", "Earth"], ans: 2, tag: "Geography" },
  { q: "RBI ka Headquarter kahan sthit hai?", opts: ["Delhi", "Kolkata", "Mumbai", "Chennai"], ans: 2, tag: "Economy" },
  { q: "Bhartiya Rail ki sthapna kis saal hui thi?", opts: ["1853", "1863", "1873", "1883"], ans: 0, tag: "Railways" },
  { q: "Light Year kiski unit (ikai) hai?", opts: ["Time", "Distance", "Speed", "Light"], ans: 1, tag: "Physics" },
  { q: "Pani (Water) ka Chemical Formula kya hai?", opts: ["HO2", "H2O", "CO2", "H2O2"], ans: 1, tag: "Chemistry" },
  { q: "Bharat ka Rashtriya Khel kaunsa hai?", opts: ["Cricket", "Kabaddi", "Hockey", "Football"], ans: 2, tag: "Sports" },
  { q: "Mahatma Gandhi ne Dandi March kab shuru kiya tha?", opts: ["1920", "1930", "1942", "1947"], ans: 1, tag: "History" },
  { q: "Blood ka laal rang kiski wajah se hota hai?", opts: ["Plasma", "Hemoglobin", "WBC", "Platelets"], ans: 1, tag: "Biology" },
  { q: "ISRO ka Headquarter kahan hai?", opts: ["Hyderabad", "Delhi", "Bengaluru", "Mumbai"], ans: 2, tag: "Static GK" },
  { q: "Mount Everest chadhne wali pehli bhartiya mahila kaun thi?", opts: ["Bachendri Pal", "Santosh Yadav", "Arunima Sinha", "Mary Kom"], ans: 0, tag: "Static GK" },

  // 🔢 Mathematics (16-30)
  { q: "Agar ek shirt ka daam ₹500 hai aur uspar 20% discount hai, toh naya daam kya hoga?", opts: ["₹380", "₹400", "₹420", "₹450"], ans: 1, tag: "Maths: Percentage" },
  { q: "12, 15 aur 20 ka LCM kya hoga?", opts: ["40", "50", "60", "120"], ans: 2, tag: "Maths: LCM" },
  { q: "Agar x + 5 = 12 hai, toh x ki value kya hogi?", opts: ["5", "6", "7", "8"], ans: 2, tag: "Maths: Algebra" },
  { q: "Ek vyakti ne ek ghadi ₹400 mein kharidi aur ₹500 mein bechi. Profit % kya hai?", opts: ["20%", "25%", "30%", "40%"], ans: 1, tag: "Maths: Profit-Loss" },
  { q: "₹1000 par 10% ki dar se 2 saal ka Simple Interest (SI) kya hoga?", opts: ["₹100", "₹150", "₹200", "₹250"], ans: 2, tag: "Maths: Simple Interest" },
  { q: "√144 + √81 ki value kya hogi?", opts: ["19", "20", "21", "22"], ans: 2, tag: "Maths: Roots" },
  { q: "A ek kaam ko 10 din mein karta hai, B usay 15 din mein. Dono milkar kitne din mein karenge?", opts: ["5 din", "6 din", "7 din", "8 din"], ans: 1, tag: "Maths: Time & Work" },
  { q: "1 se lekar 10 tak ke sabhi numbers ka average (ausat) kya hoga?", opts: ["5", "5.5", "6", "6.5"], ans: 1, tag: "Maths: Average" },
  { q: "Agar ek train 72 km/hr ki speed se chal rahi hai, toh m/s mein uski speed kya hogi?", opts: ["15 m/s", "18 m/s", "20 m/s", "25 m/s"], ans: 2, tag: "Maths: Speed-Time" },
  { q: "Ek triangle ke teeno angles ka sum kitna hota hai?", opts: ["90°", "180°", "270°", "360°"], ans: 1, tag: "Maths: Geometry" },
  { q: "3/4 ko percentage mein convert karein.", opts: ["60%", "70%", "75%", "80%"], ans: 2, tag: "Maths: Fraction" },
  { q: "Agar 5x = 45 hai, toh 2x ki value kya hogi?", opts: ["16", "18", "20", "22"], ans: 1, tag: "Maths: Algebra" },
  { q: "Ek rectangle ki lambai 10 cm aur chaudai 5 cm hai. Uska area kya hoga?", opts: ["15 sq cm", "30 sq cm", "40 sq cm", "50 sq cm"], ans: 3, tag: "Maths: Mensuration" },
  { q: "8 ka cube (8³) kya hota hai?", opts: ["256", "512", "1024", "4096"], ans: 1, tag: "Maths: Cubes" },
  { q: "0.5 × 0.5 ka result kya aayega?", opts: ["0.25", "2.5", "0.025", "25"], ans: 0, tag: "Maths: Decimals" },

  // 🧩 Reasoning & Mental Ability (31-45)
  { q: "Series poori karein: 2, 4, 8, 16, ?", opts: ["24", "30", "32", "64"], ans: 2, tag: "Reasoning: Number Series" },
  { q: "Odd one out chunein (Alag ko pehchane):", opts: ["Apple", "Banana", "Potato", "Mango"], ans: 2, tag: "Reasoning: Classification" },
  { q: "Agar DOG ko 4-15-7 likha jata hai, toh CAT ko kya likhenge? (A=1, B=2...)", opts: ["3-1-20", "3-2-20", "4-1-20", "3-1-19"], ans: 0, tag: "Reasoning: Coding" },
  { q: "A, B ka bhai hai. C, A ki behen hai. B ka C se kya rishta hai?", opts: ["Bhai/Behen", "Pita", "Chacha", "Dada"], ans: 0, tag: "Reasoning: Blood Relation" },
  { q: "Doctor : Hospital :: Teacher : ?", opts: ["Book", "Student", "School", "Chalk"], ans: 2, tag: "Reasoning: Analogy" },
  { q: "Ravi North ki taraf 5km jata hai, phir left mudkar 3km jata hai. Ab uska chehra kis disha mein hai?", opts: ["North", "South", "East", "West"], ans: 3, tag: "Reasoning: Direction" },
  { q: "Series poori karein: A, C, E, G, ?", opts: ["H", "I", "J", "K"], ans: 1, tag: "Reasoning: Letter Series" },
  { q: "Sunday se 4 din baad kaunsa din aayega?", opts: ["Wednesday", "Thursday", "Friday", "Saturday"], ans: 1, tag: "Reasoning: Calendar" },
  { q: "Odd one out chunein:", opts: ["Car", "Bus", "Train", "Bicycle"], ans: 3, tag: "Reasoning: Classification" },
  { q: "Agar aaj Monday hai, toh 15 din baad kya din hoga?", opts: ["Monday", "Tuesday", "Wednesday", "Thursday"], ans: 1, tag: "Reasoning: Calendar" },
  { q: "Window : Glass :: Book : ?", opts: ["Pen", "Paper", "Word", "Cover"], ans: 1, tag: "Reasoning: Analogy" },
  { q: "Rahul aage se 5ve number par aur peeche se 10ve number par line mein khada hai. Line mein kitne log hain?", opts: ["14", "15", "16", "13"], ans: 0, tag: "Reasoning: Ranking" },
  { q: "Series: 100, 90, 80, 70, ?", opts: ["50", "60", "55", "65"], ans: 1, tag: "Reasoning: Number Series" },
  { q: "Milk : White :: Coal : ?", opts: ["Red", "Hard", "Black", "Fire"], ans: 2, tag: "Reasoning: Analogy" },
  { q: "Find missing letter: B, E, H, K, ?", opts: ["M", "N", "O", "P"], ans: 1, tag: "Reasoning: Alphabet Series" },

  // 📝 English Language (46-50)
  { q: "Choose the correct spelling:", opts: ["Grammer", "Grammar", "Gramer", "Gremmar"], ans: 1, tag: "English: Spelling" },
  { q: "What is the synonym of 'Happy'?", opts: ["Sad", "Joyful", "Angry", "Tired"], ans: 1, tag: "English: Synonyms" },
  { q: "What is the antonym of 'Strong'?", opts: ["Brave", "Weak", "Heavy", "Tall"], ans: 1, tag: "English: Antonyms" },
  { q: "Fill in the blank: She is good ___ playing chess.", opts: ["in", "at", "on", "with"], ans: 1, tag: "English: Preposition" },
  { q: "Find the error: 'He go to school every day.'", opts: ["He", "go", "to", "school"], ans: 1, tag: "English: Grammar" }
];

let currentQ = 0;
let userAnswers = {};
let timerInterval;
let timeLeft = 3600; // 60 minutes in seconds

// 🚀 INITIAL LOAD & CHECK LOCAL STORAGE
window.onload = function() {
  const savedData = localStorage.getItem('megaMockProgress');
  if (savedData) {
    const parsedData = JSON.parse(savedData);
    const attemptedCount = Object.keys(parsedData.answers).length;
    if (attemptedCount > 0 && attemptedCount < questions.length) {
      document.getElementById('popup-msg').innerHTML = `Aapne <b>${attemptedCount} / 50</b> sawaal attempt kiye the.`;
      document.getElementById('popup-overlay').style.display = 'flex';
      return; 
    }
  }
  startFresh();
};

function startFresh() {
  currentQ = 0; userAnswers = {};
  timeLeft = 3600; // Reset Timer
  localStorage.removeItem('megaMockProgress');
  document.getElementById('popup-overlay').style.display = 'none';
  loadQuestion();
  startTimer();
}

function resumeTest() {
  const savedData = JSON.parse(localStorage.getItem('megaMockProgress'));
  userAnswers = savedData.answers; currentQ = savedData.lastIndex;
  document.getElementById('popup-overlay').style.display = 'none';
  loadQuestion();
  startTimer();
}

function restartTest() {
  document.getElementById('result-overlay').style.display = 'none';
  startFresh();
}

// ⏰ TIMER FUNCTION
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if(timeLeft <= 0) {
      clearInterval(timerInterval);
      submitTest(); // Auto submit when time is up
      return;
    }
    timeLeft--;
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById('timer').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
  }, 1000);
}

// 📖 RENDER QUESTION
function loadQuestion() {
  const qData = questions[currentQ];
  document.getElementById('q-num').innerText = `Q. ${currentQ + 1}/50`;
  document.getElementById('q-tag').innerText = qData.tag;
  document.getElementById('q-text').innerText = qData.q;
  
  const optsContainer = document.getElementById('options-container');
  optsContainer.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  
  qData.opts.forEach((opt, index) => {
    const isSelected = userAnswers[currentQ] === index;
    const btnHtml = `
      <button class="opt-btn ${isSelected ? 'selected' : ''}" onclick="selectOption(${index})">
        <div class="opt-circle">${letters[index]}</div>
        ${opt}
      </button>
    `;
    optsContainer.innerHTML += btnHtml;
  });

  // Buttons Logic
  document.getElementById('prev-btn').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  if (currentQ === questions.length - 1) {
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'block';
  } else {
    document.getElementById('next-btn').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
  }
}

// 🎯 SELECT OPTION
function selectOption(optIndex) {
  userAnswers[currentQ] = optIndex;
  localStorage.setItem('megaMockProgress', JSON.stringify({ lastIndex: currentQ, answers: userAnswers }));
  loadQuestion();
}

// ⬅️ ➡️ NAVIGATION
function changeQ(step) {
  currentQ += step;
  localStorage.setItem('megaMockProgress', JSON.stringify({ lastIndex: currentQ, answers: userAnswers }));
  loadQuestion();
}

// ✅ SUBMIT & CALCULATE SCORE
function submitTest() {
  clearInterval(timerInterval); // Stop timer
  let score = 0;
  for (let i = 0; i < questions.length; i++) {
    if (userAnswers[i] === questions[i].ans) {
      score++;
    }
  }
  
  document.getElementById('final-score').innerText = `${score} / 50`;
  
  let msg = "Thodi aur mehnat ki zarurat hai!";
  if (score >= 40) msg = "Dhamakedar! Aap Exam phod denge! 🔥";
  else if (score >= 25) msg = "Achhi tayari hai, thoda aur push karein! 👍";
  
  document.getElementById('feedback-msg').innerText = msg;
  document.getElementById('result-overlay').style.display = 'flex';
  localStorage.removeItem('megaMockProgress'); // Test over, clear save
}
</script>
</body>
</html>
