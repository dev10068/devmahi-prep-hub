<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily Planner - ExamGuru</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f1f3d; --saffron: #ff6b00; --green: #00b877; --red: #e63946;
  --yellow: #ffd60a; --text: #1a1a2e; --muted: #4b5563;
  --border: rgba(255, 255, 255, 0.4);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Noto Sans', sans-serif; color: var(--text);
  min-height: 100vh; overscroll-behavior: none;
  background-image: radial-gradient(rgba(255,255,255,0.8) 1px, transparent 1px),
                    radial-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
                    linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
  background-size: 50px 50px, 70px 70px, 100% 100%; background-attachment: fixed;
}
.glass-card {
  background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border);
  border-radius: 16px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
  padding: 20px;
}

/* Header */
header {
  background: rgba(15, 31, 61, 0.85); backdrop-filter: blur(10px);
  padding: 12px 16px; display: flex; align-items: center; gap: 14px;
  position: sticky; top:0; z-index:200; color: white; border-bottom: 1px solid rgba(255,255,255,0.1);
}
.back-btn { background:rgba(255,255,255,0.2); border:none; color:white; width:36px; height:36px; border-radius:50%; font-size:18px; cursor:pointer; }
.header-title { font-family:'Baloo 2',cursive; font-size:20px; font-weight:800; color:var(--yellow); }

/* Main Area */
.container { padding: 20px 14px; padding-bottom: 100px; }

/* Input Section */
.input-group { display: flex; gap: 10px; margin-bottom: 24px; }
.task-input { 
  flex: 1; padding: 14px 16px; border-radius: 14px; border: 2px solid rgba(0,0,0,0.1);
  font-family: 'Noto Sans', sans-serif; font-size: 14px; outline: none;
  background: rgba(255,255,255,0.8); transition: 0.2s;
}
.task-input:focus { border-color: var(--saffron); background: white; }
.add-btn { 
  background: var(--saffron); color: white; border: none; padding: 0 20px;
  border-radius: 14px; font-family: 'Baloo 2',cursive; font-size: 16px; font-weight: 800;
  cursor: pointer; box-shadow: 0 4px 15px rgba(255,107,0,0.3); transition: 0.2s;
}
.add-btn:active { transform: scale(0.95); }

/* Task List */
.task-list { display: flex; flex-direction: column; gap: 10px; }
.task-item {
  background: rgba(255,255,255,0.8); border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border: 1px solid rgba(0,0,0,0.05); transition: 0.3s;
}
.task-item.completed { background: rgba(0, 184, 119, 0.1); border-color: rgba(0, 184, 119, 0.3); }
.task-item.completed .task-text { text-decoration: line-through; color: var(--muted); }

.task-left { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
.checkbox {
  width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--muted);
  display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
  transition: 0.2s; flex-shrink: 0;
}
.task-item.completed .checkbox { background: var(--green); border-color: var(--green); }

.task-text { font-size: 14px; font-weight: 600; color: var(--navy); transition: 0.2s; word-break: break-word;}
.delete-btn {
  background: rgba(230, 57, 70, 0.1); color: var(--red); border: none;
  width: 32px; height: 32px; border-radius: 8px; font-size: 14px; font-weight: bold;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: 0.2s;
}
.delete-btn:active { background: var(--red); color: white; }

.empty-state { text-align: center; padding: 30px 10px; color: var(--muted); }
.empty-emoji { font-size: 48px; margin-bottom: 10px; display: block; }
.empty-text { font-family: 'Baloo 2',cursive; font-size: 18px; font-weight: 700; color: var(--navy); }

</style>
</head>
<body>

<header>
  <button class="back-btn" onclick="window.location.href='index.html'">←</button>
  <div class="header-title">Daily Planner 📅</div>
</header>

<div class="container">
  <div class="glass-card">
    <div class="input-group">
      <input type="text" id="taskInput" class="task-input" placeholder="Aaj kya padhna hai? (e.g. Percentage 50 Qs)" onkeypress="handleEnter(event)">
      <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <div class="task-list" id="taskList">
      </div>
  </div>
</div>

<script>
// 1. Data ko LocalStorage se nikalna (Taki app band hone par data na ude)
let tasks = JSON.parse(localStorage.getItem('examguru_planner_tasks')) || [];

const taskInput = document.getElementById('taskInput');
const taskList = document.getElementById('taskList');

// 2. Tasks ko screen par dikhana
function renderTasks() {
  taskList.innerHTML = '';
  
  if (tasks.length === 0) {
    taskList.innerHTML = `
      <div class="empty-state">
        <span class="empty-emoji">🎯</span>
        <div class="empty-text">Apna aaj ka target set karein!</div>
        <p style="font-size:12px; margin-top:5px;">Naye topics add karke apni padhai shuru karein.</p>
      </div>`;
    return;
  }

  tasks.forEach((task, index) => {
    const item = document.createElement('div');
    item.className = `task-item ${task.completed ? 'completed' : ''}`;
    
    item.innerHTML = `
      <div class="task-left" onclick="toggleTask(${index})">
        <div class="checkbox">${task.completed ? '✓' : ''}</div>
        <span class="task-text">${task.text}</span>
      </div>
      <button class="delete-btn" onclick="deleteTask(${index})">🗑️</button>
    `;
    taskList.appendChild(item);
  });
}

// 3. Naya Task Add karna
function addTask() {
  const text = taskInput.value.trim();
  if (text !== '') {
    tasks.push({ text: text, completed: false });
    saveAndRender();
    taskInput.value = ''; // Input box khali kar do
  }
}

// 4. Keyboard ka 'Enter' button dabane par task add hona
function handleEnter(e) {
  if (e.key === 'Enter') {
    addTask();
  }
}

// 5. Task ko Tick (Complete) ya Untick karna
function toggleTask(index) {
  tasks[index].completed = !tasks[index].completed;
  saveAndRender();
}

// 6. Task Delete karna
function deleteTask(index) {
  tasks.splice(index, 1);
  saveAndRender();
}

// 7. Save aur UI update ek sath
function saveAndRender() {
  localStorage.setItem('examguru_planner_tasks', JSON.stringify(tasks));
  renderTasks();
}

// Shuru mein tasks dikhana
renderTasks();

</script>
</body>
</html>
