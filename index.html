<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1f3d">
<meta name="description" content="SSC CGL & Railway NTPC Offline Exam Preparation App">
<title>ExamGuru — SSC & NTPC Offline</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f1f3d; --navy2: #1a3a6e;
  --saffron: #ff6b00; --green: #00b877;
  --red: #e63946; --yellow: #ffd60a;
  --purple: #7c3aed; --blue: #2563eb;
  --text: #1a1a2e; --muted: #4b5563;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
}

body.dark-mode {
  --text: #f0f0f0;
  --navy: #1a1a2e; --navy2: #24243e;
  --border: rgba(255, 255, 255, 0.1);
  --muted: #a0a0a0;
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }

/* ─── टाइमर विजेट (नया) ─── */
.timer-widget {
    background: rgba(255, 107, 0, 0.15);
    border: 1px solid var(--saffron);
    padding: 12px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 15px 0 10px;
    cursor: pointer;
    transition: 0.3s;
}
.timer-widget:active { transform: scale(0.98); }

/* ─── बाकि पुरानी स्टाइलिंग (बाकी सब सेम है) ─── */
body {
  font-family: 'Noto Sans', sans-serif; color: var(--text); min-height: 100vh; overscroll-behavior: none; transition: color 0.3s;
  background-image: radial-gradient(rgba(255,255,255,0.8) 1px, transparent 1px), radial-gradient(rgba(255,255,255,0.4) 1px, transparent 1px), linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
  background-size: 50px 50px, 70px 70px, 100% 100%; background-attachment: fixed;
}
/* ... बाकी का CSS वैसा ही है जैसे आपने भेजा था ... */
/* यहाँ मैंने सिर्फ बहुत लंबा कोड छोटा करने के लिए बीच का हिस्सा हटा दिया है, 
   आप अपनी पुरानी फाइल का CSS हिस्सा यहाँ कॉपी-पेस्ट कर सकते हो */
</style>
</head>
<body>

<header>
  <div class="logo">Exam<span>Guru</span></div>
  <div class="header-right">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    <div class="offline-badge">📴 OFFLINE READY</div>
  </div>
</header>

<div id="home-screen" class="screen active">
  <div class="hero">
    <div class="hero-tag">🇮🇳 FREE • OFFLINE • NO ADS</div>
    <h1>Crack <em>SSC CGL</em> &<br><em>Railway NTPC</em> 🎯</h1>
    
    <div class="timer-widget" onclick="window.location.href='timer.html'">
        <div style="font-size: 26px;">⏱️</div>
        <div>
            <h4 style="font-size:14px; color:var(--saffron); font-weight:800;">Study Timer & Calendar</h4>
            <p style="font-size:11px; color:var(--muted);">Rozana ki padhai track karein</p>
        </div>
    </div>

    <p>5 Saal PYQ • Topicwise MCQ • Maths Booster</p>
    <div class="hero-chips">
      <span class="hero-chip">📴 Bina Internet</span>
      <span class="hero-chip">📋 2500+ Questions</span>
      <span class="hero-chip">🔥 Explanations</span>
    </div>
  </div>

  <div class="stats-row">
    </div>
  </div>

<script>
// ... आपका पूरा पुराना JavaScript ...
</script>
</body>
</html>
