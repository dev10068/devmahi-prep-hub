<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Study Tracker</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .clock { font-size: 50px; background: #333; padding: 20px; border-radius: 10px; margin: 20px; }
        .calendar-nav { display: flex; gap: 20px; margin: 10px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; max-width: 400px; }
        .day { padding: 10px; background: #333; text-align: center; cursor: pointer; border-radius: 5px; }
        .day:hover { background: #555; }
    </style>
</head>
<body>

    <div class="clock" id="display">00:00:00</div>
    <button id="mainBtn" onclick="toggleTimer()" style="padding:15px 30px; font-size:18px; background:#00b877; border:none; color:white; border-radius:10px;">Start Study</button>

    <div class="calendar-nav">
        <button onclick="changeMonth(-1)">Prev</button>
        <h3 id="monthYear">June 2026</h3>
        <button onclick="changeMonth(1)">Next</button>
    </div>
    <div id="calendar" class="grid"></div>

<script>
    let seconds = 0, timerInterval = null, isRunning = false;
    let currentViewDate = new Date();

    function toggleTimer() {
        const btn = document.getElementById('mainBtn');
        if (isRunning) {
            clearInterval(timerInterval);
            let dateKey = new Date().toISOString().split('T')[0];
            let existing = parseInt(localStorage.getItem(dateKey)) || 0;
            localStorage.setItem(dateKey, existing + seconds);
            seconds = 0;
            btn.innerText = "Start Study";
            btn.style.background = "#00b877";
        } else {
            timerInterval = setInterval(() => { seconds++; updateDisplay(); }, 1000);
            btn.innerText = "Stop & Save";
            btn.style.background = "#ff6b00";
        }
        isRunning = !isRunning;
        renderCalendar();
    }

    function updateDisplay() {
        let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
        let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
        let s = (seconds % 60).toString().padStart(2, '0');
        document.getElementById('display').innerText = `${h}:${m}:${s}`;
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        cal.innerHTML = '';
        let year = currentViewDate.getFullYear();
        let month = currentViewDate.getMonth();
        document.getElementById('monthYear').innerText = currentViewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        
        let daysInMonth = new Date(year, month + 1, 0).getDate();
        for (let i = 1; i <= daysInMonth; i++) {
            let dateKey = `${year}-${(month+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
            let div = document.createElement('div');
            div.className = 'day';
            let savedTime = Math.floor((localStorage.getItem(dateKey) || 0) / 60);
            div.innerHTML = `${i}<br><small>${savedTime}m</small>`;
            div.onclick = () => alert(`Date: ${dateKey}\nStudy Time: ${savedTime} minutes`);
            cal.appendChild(div);
        }
    }

    function changeMonth(step) {
        currentViewDate.setMonth(currentViewDate.getMonth() + step);
        renderCalendar();
    }

    renderCalendar();
</script>
</body>
</html>
